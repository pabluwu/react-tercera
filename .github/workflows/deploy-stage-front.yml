name: Deploy React Frontend to Staging

on:
  push:
    branches:
      - test  # Se activa al hacer push a la rama de pruebas

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código del repositorio
    - name: Checkout del código
      uses: actions/checkout@v4

    # 2. Configurar Node.js usando la versión recomendada para Vite moderno
    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    # 3. Instalar dependencias respetando el lockfile
    - name: Instalar dependencias
      run: npm ci

    # 4. Compilar el proyecto para producción (Creará la carpeta /dist)
    # Aquí inyectamos la URL de tu API de pruebas para que React sepa a dónde apuntar
    - name: Compilar proyecto
      env:
        VITE_API_URL: http://test-api.terceraquillota.cl/api/  #
        CI: false # 👈 AGREGA ESTA LÍNEA AQUÍ
      run: npm run build

    # 5. Subir los archivos estáticos compilados al VPS vía RSYNC SSH
    - name: Sincronizar archivos con el VPS
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        # 🟢 CORREGIDO: Apuntamos a 'build/' que es lo que genera Create React App
        source: "build/" 
        target: "/var/www/stage-front"
        # Mantiene el 1 para que suba solo el contenido de adentro de build/ directamente a /var/www/stage-front
        strip_components: 1         # Evita que se cree la carpeta "dist" dentro del VPS, sube solo el contenido